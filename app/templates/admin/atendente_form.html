{% extends 'base.html' %}
{% block content %}
<h2>Novo Atendente</h2>
<form method="POST" class="mt-3" style="max-width:500px">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="mb-3">
    <label class="form-label">Nome completo</label>
    <input type="text" name="nome" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">E-mail</label>
    <input type="email" name="email" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Senha inicial</label>
    <input type="password" name="senha" class="form-control" required>
  </div>
  <button type="submit" class="btn btn-danger">Criar atendente</button>
  <a href="{{ url_for('admin.atendentes') }}" class="btn btn-outline-secondary">Cancelar</a>
</form>
{% endblock %}
