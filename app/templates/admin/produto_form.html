{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="mb-4">{% if produto %}Editar{% else %}Novo{% endif %} Produto</h4>
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label fw-bold">Nome</label>
            <input type="text" name="nome" class="form-control" value="{{ produto.nome if produto else '' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Descrição</label>
            <textarea name="descricao" class="form-control" rows="3">{{ produto.descricao if produto else '' }}</textarea>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Preço (R$)</label>
              <input type="number" name="preco" step="0.01" class="form-control" value="{{ produto.preco if produto else '' }}" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Estoque</label>
              <input type="number" name="estoque" class="form-control" value="{{ produto.estoque if produto else '' }}" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Categoria</label>
            <select name="categoria_id" class="form-select" required>
              {% for c in categorias %}
                <option value="{{ c.id }}" {% if produto and produto.categoria_id == c.id %}selected{% endif %}>{{ c.nome }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">URL da Imagem</label>
            <input type="text" name="image_url" class="form-control" value="{{ produto.image_url if produto else '' }}">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Salvar</button>
            <a href="{{ url_for('admin.produtos') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
