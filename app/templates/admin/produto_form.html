{% extends 'base.html' %}
{% block content %}
<h2>{{ 'Editar' if produto else 'Novo' }} Produto</h2>
<form method="POST" class="mt-3" style="max-width:600px">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="mb-3">
    <label class="form-label">Nome</label>
    <input type="text" name="nome" class="form-control" required
           value="{{ produto.nome if produto else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">Descrição</label>
    <textarea name="descricao" class="form-control" rows="3">{{ produto.descricao if produto else '' }}</textarea>
  </div>
  <div class="row">
    <div class="col mb-3">
      <label class="form-label">Preço (R$)</label>
      <input type="number" name="preco" step="0.01" min="0.01" class="form-control" required
             value="{{ produto.preco if produto else '' }}">
    </div>
    <div class="col mb-3">
      <label class="form-label">Estoque</label>
      <input type="number" name="estoque" min="0" class="form-control" required
             value="{{ produto.estoque if produto else 0 }}">
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label">Categoria</label>
    <select name="categoria_id" class="form-select" required>
      {% for c in categorias %}
        <option value="{{ c.id }}" {{ 'selected' if produto and produto.categoria_id == c.id }}>
          {{ c.nome }}
        </option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">URL da imagem</label>
    <input type="text" name="image_url" class="form-control"
           value="{{ produto.image_url if produto else '' }}">
  </div>
  <button type="submit" class="btn btn-danger">Salvar</button>
  <a href="{{ url_for('admin.produtos') }}" class="btn btn-outline-secondary">Cancelar</a>
</form>
{% endblock %}
