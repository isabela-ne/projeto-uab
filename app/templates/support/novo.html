{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="mb-4">Abrir Novo Chamado</h4>
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label fw-bold">Assunto</label>
            <input type="text" name="assunto" class="form-control" placeholder="Ex: Problema com meu pedido" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold">Mensagem</label>
            <textarea name="mensagem" class="form-control" rows="5" placeholder="Descreva sua dúvida ou problema..." required></textarea>
          </div>
          <button type="submit" class="btn btn-danger w-100">Enviar Chamado</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
